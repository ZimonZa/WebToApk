name: Build Android APK
run-name: WebToApk ${{ inputs.buildId }}

# Triggered by the WebToApk web app (or manually from the Actions tab, once a
# matching inputs/<buildId>/config.json exists on the branch).
on:
  workflow_dispatch:
    inputs:
      buildId:
        description: "Build id — reads inputs/<buildId>/config.json (+ optional icon.png)"
        required: true

permissions:
  contents: write   # publish the APK Release + clean up build inputs

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read build config
        run: |
          CFG="inputs/${{ inputs.buildId }}/config.json"
          if [ ! -f "$CFG" ]; then echo "::error::config not found: $CFG"; exit 1; fi
          {
            echo "APP_URL=$(jq -r '.url' "$CFG")"
            echo "APP_NAME=$(jq -r '.appName' "$CFG")"
            echo "APP_ID=$(jq -r '.packageId' "$CFG")"
            echo "THEME_COLOR=$(jq -r '.themeColor // "#111827"' "$CFG")"
            echo "ORIENTATION=$(jq -r '.orientation // "default"' "$CFG")"
            echo "PERM_CAMERA=$(jq -r '.permissions.camera // false' "$CFG")"
            echo "PERM_MIC=$(jq -r '.permissions.microphone // false' "$CFG")"
            echo "PERM_LOCATION=$(jq -r '.permissions.location // false' "$CFG")"
            echo "PERM_NOTIFICATIONS=$(jq -r '.permissions.notifications // false' "$CFG")"
            echo "PULL_REFRESH=$(jq -r '.pullToRefresh // false' "$CFG")"
            echo "SHOW_RELOAD=$(jq -r '.showReload // false' "$CFG")"
            echo "PLATFORM=android"
          } >> "$GITHUB_ENV"
          ICON="inputs/${{ inputs.buildId }}/icon.png"
          if [ -f "$ICON" ]; then echo "ICON_PATH=$ICON" >> "$GITHUB_ENV"; fi

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Scaffold Capacitor project
        run: node scripts/scaffold.mjs

      - name: Build debug APK
        working-directory: _build/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          APK=$(find _build/android -path '*/apk/debug/*.apk' | head -n1)
          SAFE=$(echo "$APP_NAME" | tr ' ' '-' | tr -cd '[:alnum:]-_')
          cp "$APK" "out/${SAFE}-debug.apk"
          echo "APK_FILE=out/${SAFE}-debug.apk" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-apk
          path: ${{ env.APK_FILE }}

      - name: Publish APK as Release (direct download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ inputs.buildId }}
          name: ${{ env.APP_NAME }} (${{ inputs.buildId }})
          body: |
            Android debug APK built by WebToApk.
            Site: ${{ env.APP_URL }}
            Package: ${{ env.APP_ID }}
          files: ${{ env.APK_FILE }}

      - name: Cleanup build inputs
        if: always()
        continue-on-error: true
        run: |
          git config user.name "webtoapk-bot"
          git config user.email "bot@users.noreply.github.com"
          git rm -r --ignore-unmatch "inputs/${{ inputs.buildId }}" || exit 0
          git diff --cached --quiet && exit 0
          git commit -m "chore: cleanup inputs ${{ inputs.buildId }}"
          git pull --rebase origin main || true
          git push || true
